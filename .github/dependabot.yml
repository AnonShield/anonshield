version: 2

# Automated dependency vulnerability alerts and update pull requests for the
# Python (uv), frontend (npm), and GitHub Actions ecosystems. Updates within an
# ecosystem are grouped into a single PR to reduce noise.
#
# Docker base images are intentionally NOT tracked here: they are pinned to
# floating major.minor tags (python:3.12-slim, node:22-alpine) that receive
# patches automatically on rebuild, and the Trivy job in ci-cd.yml already scans
# the images for known vulnerabilities on every run. Dependabot would otherwise
# keep proposing breaking base-image jumps (python 3.14, node 26, cuda 13) and
# noisy patch bumps for the unused GPU/CLI image.
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/web/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
