version: 2

# Automated dependency vulnerability alerts and update pull requests.
# Covers the Python (uv), frontend (npm), Docker, and GitHub Actions ecosystems.
# Updates within an ecosystem are grouped into a single PR to reduce noise.
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/web/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directories:
      - "/web/backend"
      - "/web/frontend"
      - "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
    # Runtime base images (python, node, cuda) are pinned to a major.minor tag.
    # CI does not build these images, so any version jump is unvalidated and a
    # minor bump is breaking too (e.g. python 3.12 -> 3.14 is a semver MINOR but
    # changes the interpreter and wheel availability; node 22 -> 26 is a major).
    # Allow only patch/digest updates that stay on the current major.minor.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
