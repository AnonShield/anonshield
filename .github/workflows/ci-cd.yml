name: CI/CD

# CI (tests + frontend build) runs on GitHub-hosted runners for every push and
# pull request. The deploy job runs on the self-hosted production runner and only
# for pushes to main, after CI passes. The production host is never named here:
# the runner connects out to GitHub and is selected by the generic label below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANON_SECRET_KEY: test-key-12345678901234567890123456789012
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-v1
      - name: Run tests
        run: uv run pytest -m "not slow and not slm and not ocr" -q --timeout=300

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # SvelteKit needs this public var present at build time; the value only
      # matters at runtime (the deployed image injects the real one).
      PUBLIC_API_URL: http://localhost:8000
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  vuln-scan:
    name: Dependency & container scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Python dependency audit (pip-audit)
        run: |
          uv export --frozen --no-dev --format requirements-txt -o /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt --progress-spinner off
        continue-on-error: true
      - name: Frontend dependency audit (npm audit)
        working-directory: web/frontend
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Filesystem vulnerability & misconfig scan (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

  secret-scan:
    name: Secret scan & SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact --exit-code 1
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Python SAST (bandit)
        run: uvx bandit -r src web/backend -ll -q
        continue-on-error: true

  deploy:
    name: Deploy to production
    needs: [test, frontend, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'AnonShield/anonshield'
    runs-on: [self-hosted, anonshield-prod]
    timeout-minutes: 30
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Sync code into the live deploy directory
        # Mirrors scripts/deploy.sh, but locally on the host. Only the code dirs
        # are mirrored with --delete; the host's local files (web/.env, web/certs,
        # datasets, db, logs) are never touched.
        run: |
          set -euo pipefail
          SRC="$GITHUB_WORKSPACE"
          DEST="$HOME/anonshield_deploy"
          mkdir -p "$DEST/web"
          PY=(--exclude=__pycache__ --exclude='*.pyc')
          rsync -a --delete "${PY[@]}" --exclude=node_modules --exclude=.svelte-kit --exclude=build \
            "$SRC/web/frontend/src/"      "$DEST/web/frontend/src/"
          rsync -a --delete "$SRC/web/frontend/static/" "$DEST/web/frontend/static/"
          rsync -a --delete "${PY[@]}"  "$SRC/web/backend/" "$DEST/web/backend/"
          rsync -a --delete "${PY[@]}"  "$SRC/src/"         "$DEST/src/"
          rsync -a "$SRC/web/Makefile" "$SRC/web/warm_cache.sh" "$SRC/web/RUNBOOK.md" \
                   "$SRC/web/docker-compose.prod.yml" "$SRC/web/docker-compose.host.yml" "$DEST/web/"
          rsync -a "$SRC/web/frontend/Dockerfile" "$DEST/web/frontend/Dockerfile"
          rsync -a "$SRC/pyproject.toml" "$SRC/uv.lock" "$SRC/anon.py" "$DEST/"
      - name: Build, start, and warm the cache
        run: cd "$HOME/anonshield_deploy/web" && make deploy
      - name: Health check
        run: curl -fsS --retry 6 --retry-delay 10 https://anonshield.org/api/health
