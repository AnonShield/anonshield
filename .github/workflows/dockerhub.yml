name: Publish to Docker Hub

# Builds the standalone CLI image (docker/Dockerfile) and pushes it to Docker Hub,
# then syncs the Docker Hub repository description from docker/DOCKERHUB_README.md.
# Runs on a published GitHub release, or manually via the Actions tab.
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - a Docker Hub account with push access to anonshield/anon
#   DOCKERHUB_TOKEN     - a Docker Hub access token for that account

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.0.0)"
        required: false
        default: latest

permissions:
  contents: read

env:
  IMAGE: anonshield/anon

jobs:
  publish:
    name: Build and push CLI image
    runs-on: ubuntu-latest
    if: github.repository == 'AnonShield/anonshield'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Resolve version tag
        id: ver
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"
      - name: Build and push CPU image (latest + version)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: gpu
          push: true
          tags: |
            ${{ env.IMAGE }}:gpu
            ${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}-gpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sync Docker Hub description from DOCKERHUB_README.md
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          readme-filepath: ./docker/DOCKERHUB_README.md
