name: Publish to Docker Hub

# Two automations for the standalone CLI image (anonshield/anon):
#  - sync-description: pushes docker/DOCKERHUB_README.md to the Docker Hub repo
#    description automatically whenever that file changes on main (and on release).
#  - publish: builds the CLI image (CPU + GPU targets) and pushes it to Docker Hub,
#    on a published GitHub release or a manual run.
#
# Secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  Docker Hub account with push access to anonshield/anon
#   DOCKERHUB_TOKEN     Docker Hub access token (for the image push)
#   DOCKERHUB_PASSWORD  Docker Hub account password (the description API needs it)

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - docker/DOCKERHUB_README.md
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.0.0)"
        required: false
        default: latest

permissions:
  contents: read

env:
  IMAGE: anonshield/anon

jobs:
  sync-description:
    name: Sync Docker Hub description
    runs-on: ubuntu-latest
    if: github.repository == 'AnonShield/anonshield'
    steps:
      - uses: actions/checkout@v7
      - name: Sync Docker Hub description from DOCKERHUB_README.md
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD || secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          readme-filepath: ./docker/DOCKERHUB_README.md

  publish:
    name: Build and push CLI image
    # Build and push images only on a release or a manual run, never on a
    # README-only change (that just re-syncs the description above).
    if: >-
      github.repository == 'AnonShield/anonshield' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Free up runner disk space (the GPU image is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Resolve image tags
        id: tags
        # CPU image is always :latest; GPU image is always :gpu. A version-suffixed
        # tag (:X.Y.Z and :X.Y.Z-gpu) is added only for a real release, never for
        # the plain "latest" publish (which would otherwise create a stray :latest-gpu).
        run: |
          VER="${{ github.event.release.tag_name || inputs.tag || 'latest' }}"
          {
            echo "cpu<<EOF"
            echo "$IMAGE:latest"
            if [ "$VER" != "latest" ] && [ -n "$VER" ]; then echo "$IMAGE:$VER"; fi
            echo "EOF"
            echo "gpu<<EOF"
            echo "$IMAGE:gpu"
            if [ "$VER" != "latest" ] && [ -n "$VER" ]; then echo "$IMAGE:$VER-gpu"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: ${{ steps.tags.outputs.cpu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: gpu
          push: true
          tags: ${{ steps.tags.outputs.gpu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
