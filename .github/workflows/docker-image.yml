name: Docker image

# Builds and pushes the standalone CLI image (anonshield/anon). It runs ONLY when
# something that actually goes into the image changes, so a docs or README edit
# never triggers a build.
#
#  - push to main touching image inputs (Dockerfile, entrypoint, src, scripts,
#    anon.py, deps): rebuild and push BOTH the CPU image (:latest) and the GPU
#    image (:gpu), keeping them current with the code.
#  - published release or manual run: same build, plus version-suffixed tags
#    (:X.Y.Z and :X.Y.Z-gpu).
#
# README-only changes are handled by dockerhub-readme.yml (description sync, no build).
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (push access to anonshield/anon).

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
      - docker/docker-entrypoint.sh
      - src/**
      - scripts/**
      - anon.py
      - pyproject.toml
      - uv.lock
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.0.0)"
        required: false
        default: latest

permissions:
  contents: read

env:
  IMAGE: anonshield/anon

jobs:
  build:
    name: Build and push CLI image
    if: github.repository == 'AnonShield/anonshield'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Free up runner disk space (the GPU image is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h /
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Resolve image tags
        id: tags
        # CPU image is always :latest; GPU image is always :gpu. A version-suffixed
        # tag (:X.Y.Z and :X.Y.Z-gpu) is added only for a real release, never for
        # the plain "latest" publish (which would otherwise create a stray :latest-gpu).
        run: |
          VER="${{ github.event.release.tag_name || inputs.tag || 'latest' }}"
          {
            echo "cpu<<EOF"
            echo "$IMAGE:latest"
            if [ "$VER" != "latest" ] && [ -n "$VER" ]; then echo "$IMAGE:$VER"; fi
            echo "EOF"
            echo "gpu<<EOF"
            echo "$IMAGE:gpu"
            if [ "$VER" != "latest" ] && [ -n "$VER" ]; then echo "$IMAGE:$VER-gpu"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push CPU image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: ${{ steps.tags.outputs.cpu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push GPU image
        # ~3 GB image, built on every image-input change too (not just releases),
        # so :gpu stays current with the code. This makes the job take longer.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          target: gpu
          push: true
          tags: ${{ steps.tags.outputs.gpu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
